<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#00d4ff" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; media-src blob:; worker-src 'self'">
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/library.css" />
  <title>AXIOM Reader</title>

</head>
<body>

<div id="screen-library" class="screen active">
  <div class="topbar">
    <div class="topbar-left">
      <span class="logo">AXIOM // Reader</span>
    </div>
  </div>
  <div id="lib-body">
    <div id="lib-browse-section">
      <button id="open-folder-btn" class="open-folder-btn">&#x1F4C2; Open Folder</button>
      <button id="open-file-btn" class="open-file-btn">&#x1F4C4; Open File</button>
    </div>
    <div id="lib-recents-section">
      <div class="lib-section-label">Recent Files</div>
      <div id="lib-recents-list"></div>
    </div>
  </div>
</div>

<div id="screen-browse" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <button class="topbar-back" id="browse-back-btn">&#x2039;</button>
      <span class="logo" id="browse-folder-name">Folder</span>
    </div>
  </div>
  <div id="browse-file-list"></div>
</div>

<div id="screen-reader" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <button class="topbar-back" id="reader-back-btn">&#x2039;</button>
      <span class="logo">AXIOM</span>
    </div>
    <span id="file-name">No file loaded</span>
  </div>
  <div id="controls">
    <div id="transport">
      <button class="t-btn" id="btn-b5">&#x23EE;</button>
      <button class="t-btn" id="btn-prev">&#x25C0;</button>
      <button id="play-btn">&#x25B6;</button>
      <button class="t-btn" id="btn-next">&#x25B6;</button>
      <button class="t-btn" id="btn-f5">&#x23ED;</button>
    </div>
    <div id="bottom-controls">
      <span class="ctrl-label">Speed</span>
      <input type="range" id="rate-slider" min="0.5" max="2.0" step="0.1" value="0.95" />
      <span class="ctrl-val" id="rate-val">0.95&#xD7;</span>
      <select id="voice-sel"></select>
      <button class="open-btn" id="note-current-btn">Note</button>
      <button class="open-btn" id="save-notes-btn">Save notes</button>
      <button class="open-btn" id="open-btn">Open file</button>
      <span id="pos-label">&#x2014; / &#x2014;</span>
    </div>
  </div>
  <div id="reader-main">
    <div id="load-screen">
      <div class="load-icon">&#x1F4C4;</div>
      <h2>Open a File</h2>
      <p>Select any .md, .txt, or text-based .pdf file from your library, or open one directly. The info card and revision notes are displayed but not read aloud.</p>
      <button class="pick-btn" id="load-pick-btn">Select File</button>
    </div>
    <div id="doc-view" style="display:none">
      <div id="doc-render"></div>
    </div>
  </div>
</div>

<div id="note-modal" class="note-modal" aria-hidden="true">
  <div class="note-dialog" role="dialog" aria-modal="true" aria-labelledby="note-title">
    <div class="note-kicker">Review Note</div>
    <h2 id="note-title">Section Note</h2>
    <blockquote id="note-section-excerpt"></blockquote>
    <textarea id="note-text" rows="7" placeholder="What needs editing here?"></textarea>
    <div class="note-actions">
      <button class="note-delete" id="note-delete-btn">Delete</button>
      <button class="note-cancel" id="note-cancel-btn">Cancel</button>
      <button class="note-save" id="note-save-btn">Save</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept=".md,.txt,.pdf" />
<input type="file" id="dir-input" webkitdirectory />

<script src="./js/parser.js"></script>
<script src="./js/tts.js"></script>
<script src="./js/library.js"></script>
<script src="./js/pdf.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
